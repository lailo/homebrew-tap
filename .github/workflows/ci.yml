name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: Homebrew/actions/setup-homebrew@main

      - name: Tap this repo
        run: |
          TAP="$(brew --repository)/Library/Taps/lailo/homebrew-tap"
          mkdir -p "$(dirname "$TAP")"
          [ -e "$TAP" ] || ln -s "$GITHUB_WORKSPACE" "$TAP"

      - name: Style
        run: brew style .

      - name: Audit cask
        run: brew audit --strict lailo/tap/bowzer

      - name: Audit formula
        run: brew audit --strict lailo/tap/bergauf

      - name: Smoke install bergauf
        run: |
          brew install lailo/tap/bergauf
          brew test bergauf
          brew uninstall bergauf

      - name: Smoke fetch bowzer
        run: brew fetch --cask lailo/tap/bowzer
